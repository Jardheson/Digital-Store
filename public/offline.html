<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Digital Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 20px;
            text-align: center;
            max-width: 500px;
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 16px;
        }
        
        .info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .info h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .info ul {
            list-style: none;
            color: #666;
            font-size: 14px;
        }
        
        .info li {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info li:last-child {
            border-bottom: none;
        }
        
        button {
            background: #E91E63;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            background: #c2185b;
        }
        
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📴</div>
        <h1>Você está offline</h1>
        <p>Parece que você perdeu a conexão com a internet. Mas não se preocupe!</p>
        
        <div class="info">
            <h2>O que você pode fazer:</h2>
            <ul>
                <li>✓ Visualizar produtos em cache</li>
                <li>✓ Consultar seu carrinho</li>
                <li>✓ Acessar suas informações salvas</li>
            </ul>
        </div>
        
        <button onclick="window.location.href = '/'">Voltar para Home</button>
        
        <div class="footer">
            <p>Conecte-se à internet para continuar comprando</p>
        </div>
    </div>
</body>
</html>
